package com.example.secretcalculator

import android.content.Intent
import android.os.Bundle
import android.widget.Button
import android.widget.TextView
import androidx.appcompat.app.AppCompatActivity

class MainActivity : AppCompatActivity() {

    private lateinit var display: TextView
    private var currentInput = "0"
    private var firstOperand = 0.0
    private var operator = ""
    private var waitingForSecondOperand = false
    private val secretCode = "1102"

    override fun onCreate(savedInstanceState: Bundle?) {
        super.onCreate(savedInstanceState)
        setContentView(R.layout.activity_main)
        display = findViewById(R.id.display)
        setupNumberButtons()
        setupOperatorButtons()
        setupEqualsButton()
        setupClearButton()
        setupBackButton()
    }

    private fun setupNumberButtons() {
        val buttons = mapOf(R.id.btn0 to "0", R.id.btn1 to "1", R.id.btn2 to "2", R.id.btn3 to "3", R.id.btn4 to "4", R.id.btn5 to "5", R.id.btn6 to "6", R.id.btn7 to "7", R.id.btn8 to "8", R.id.btn9 to "9")
        for ((id, num) in buttons) {
            findViewById<Button>(id).setOnClickListener { onNumberPressed(num) }
        }
    }

    private fun onNumberPressed(number: String) {
        currentInput = if (waitingForSecondOperand) number else if (currentInput == "0") number else currentInput + number
        waitingForSecondOperand = false
        display.text = currentInput
    }

    private fun setupOperatorButtons() {
        findViewById<Button>(R.id.btnPlus).setOnClickListener { onOperatorPressed("+") }
        findViewById<Button>(R.id.btnMinus).setOnClickListener { onOperatorPressed("-") }
        findViewById<Button>(R.id.btnMultiply).setOnClickListener { onOperatorPressed("×") }
        findViewById<Button>(R.id.btnDivide).setOnClickListener { onOperatorPressed("÷") }
    }

    private fun onOperatorPressed(op: String) {
        if (currentInput == secretCode) { openLoveNotes(); return }
        firstOperand = currentInput.toDouble()
        operator = op
        waitingForSecondOperand = true
        display.text = "$currentInput $operator"
    }

    private fun setupEqualsButton() {
        findViewById<Button>(R.id.btnEquals).setOnClickListener {
            if (currentInput == secretCode) { openLoveNotes(); return@setOnClickListener }
            if (operator.isNotEmpty() && !waitingForSecondOperand) calculateResult()
        }
    }

    private fun calculateResult() {
        val second = currentInput.toDouble()
        val result = when (operator) {
            "+" -> firstOperand + second
            "-" -> firstOperand - second
            "×" -> firstOperand * second
            "÷" -> if (second != 0.0) firstOperand / second else Double.NaN
            else -> second
        }
        currentInput = if (result == result.toLong().toDouble()) result.toLong().toString() else String.format("%.2f", result)
        display.text = currentInput
        operator = ""
        waitingForSecondOperand = false
    }

    private fun setupClearButton() {
        findViewById<Button>(R.id.btnClear).setOnClickListener {
            currentInput = "0"; firstOperand = 0.0; operator = ""; waitingForSecondOperand = false; display.text = "0"
        }
    }

    private fun setupBackButton() {
        findViewById<Button>(R.id.btnBack).setOnClickListener {
            currentInput = if (currentInput.length > 1) currentInput.dropLast(1) else "0"
            display.text = currentInput
        }
    }

    private fun openLoveNotes() {
        startActivity(Intent(this, LoveNotesActivity::class.java))
        currentInput = "0"; operator = ""; waitingForSecondOperand = false
    }
}

