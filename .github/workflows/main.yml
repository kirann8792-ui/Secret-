package com.example.secretcalculator

import android.animation.ObjectAnimator
import android.animation.ValueAnimator
import android.os.Bundle
import android.view.animation.LinearInterpolator
import android.widget.TextView
import androidx.appcompat.app.AppCompatActivity

class LoveNotesActivity : AppCompatActivity() {
    override fun onCreate(savedInstanceState: Bundle?) {
        super.onCreate(savedInstanceState)
        setContentView(R.layout.activity_love_notes)
        val messageView = findViewById<TextView>(R.id.displayNote)
        val heartsView = findViewById<TextView>(R.id.hearts)
        messageView.text = "Dear Cutest Couple\n\nHappy one month of your marriage\n\nMay this one month lead to infinite years together. We all wish you a lot of happiness and joy. Be the best couple as you are always. Our family loves you so much.\n\nFrom your sisters 😘"
        ObjectAnimator.ofFloat(heartsView, "translationY", 0f, -30f, 0f).apply {
            duration = 1500; repeatCount = ValueAnimator.INFINITE; interpolator = LinearInterpolator(); start()
        }
    }
}

